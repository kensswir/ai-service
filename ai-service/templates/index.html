<!DOCTYPE html>
<html>
<head>
    <title>Food Safety Retail Dashboard</title>
    <style>
        body { font-family: Arial; background:#111; color:#fff; }
        .box { margin:20px; padding:15px; border-radius:10px; background:#222; }
        .high { color:red; }
        .med { color:orange; }
        .low { color:lightgreen; }
    </style>
</head>

<body>

<h1>🇩🇪 Retail Food Safety Dashboard</h1>

<div class="box">
    <h2>🚨 Food Recalls</h2>
    <div id="recalls"></div>
</div>

<div class="box">
    <h2>🛒 Retail News (ALDI / LIDL / REWE / EDEKA)</h2>
    <div id="retail"></div>
</div>

<div class="box">
    <h2>💬 Complaints / Investigations</h2>
    <div id="complaints"></div>
</div>

<script>
async function loadData(){
    const res = await fetch("/api/news");
    const data = await res.json();

    document.getElementById("recalls").innerHTML =
        data.food_recall.map(a => `<p class="high">[RECALL] ${a.title}</p>`).join("");

    document.getElementById("retail").innerHTML =
        data.retail.map(a => `<p class="med">[RETAIL] ${a.title}</p>`).join("");

    document.getElementById("complaints").innerHTML =
        data.complaints.map(a => `<p class="low">[CASE] ${a.title}</p>`).join("");
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
