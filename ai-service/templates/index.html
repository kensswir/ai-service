<!DOCTYPE html>
<html>
<head>
    <title>Retail Risk Dashboard</title>
</head>

<body>
    <h1>🧠 Retail Risk Dashboard</h1>
    <h3 id="status">Loading...</h3>

    <ul id="news"></ul>

    <script>
        async function load() {
            const res = await fetch("/api/retail-news-page?page=1");
            const data = await res.json();

            document.getElementById("status").innerText =
                "Total: " + data.total;

            const list = document.getElementById("news");
            list.innerHTML = "";

            data.articles.forEach(a => {
                const color =
                    a.risk === "HIGH" ? "red" :
                    a.risk === "MEDIUM" ? "orange" : "green";

                const li = document.createElement("li");

                li.innerHTML = `
                    <b style="color:${color}">
                        [${a.risk}]
                    </b>
                    <a href="${a.link}" target="_blank">
                        ${a.title}
                    </a>
                `;

                list.appendChild(li);
            });
        }

        load();
    </script>
</body>
</html>
