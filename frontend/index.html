<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Germany Food Retail Monitor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #111827;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 18px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .meta {
      font-size: 12px;
      color: gray;
      margin-top: 8px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:disabled {
      background: gray;
    }

    #status {
      text-align: center;
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  🛒 Germany Food & Retail Monitor (ALDI / LIDL / REWE / Düsseldorf)
</header>

<div class="container">

  <div id="status">Loading...</div>

  <div class="buttons">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
  </div>

  <div id="news"></div>

</div>

<script>

let page = 1;

// 🌍 YOUR LIVE BACKEND (Render)
const API_BASE = "https://retail-ai-backend-sugq.onrender.com";

async function loadNews() {
  try {
    document.getElementById("status").innerText =
      "Loading page " + page + "...";

    const res = await fetch(`${API_BASE}/api/retail-news-page?page=${page}`);
    const data = await res.json();

    const container = document.getElementById("news");
    container.innerHTML = "";

    if (!data.articles || data.articles.length === 0) {
      container.innerHTML = "<p style='text-align:center'>No more news found.</p>";
      document.getElementById("status").innerText = "No data";
      return;
    }

    data.articles.forEach(item => {
      container.innerHTML += `
        <div class="card">
          <h3>${item.title}</h3>
          <p>${item.contentSnippet || ""}</p>

          <div class="meta">
            🏪 Germany Food Retail • Düsseldorf / NRW Monitor
          </div>

          <a href="${item.link}" target="_blank">Read original</a>
        </div>
      `;
    });

    document.getElementById("status").innerText =
      `Page ${data.page} | Total: ${data.total}`;

  } catch (err) {
    console.log(err);
    document.getElementById("status").innerText =
      "Error loading news (backend not reachable)";
  }
}

function nextPage() {
  page++;
  loadNews();
}

function prevPage() {
  if (page > 1) {
    page--;
    loadNews();
  }
}

// initial load
loadNews();

// auto refresh every 5 minutes
setInterval(loadNews, 300000);

</script>

</body>
</html>
